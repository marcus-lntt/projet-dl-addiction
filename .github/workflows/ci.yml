name: CI — Tests & Code Quality

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Check imports
        run: |
          uv run python - <<'PY'
          from src.preprocessing import load_data, prepare_ml, FEATURES
          from src.models_ml import train_ridge
          from src.models_dl import MLP
          from src.models_advanced import TemporalTransformer
          from src.evaluation import regression_metrics
          print("Tous les modules importent correctement.")
          PY
